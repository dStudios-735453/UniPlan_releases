name: Build and Release UniPlan (mobile)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      build_android:
        description: "Build Android APK"
        type: boolean
        default: true
      build_ios:
        description: "Build iOS IPA"
        type: boolean
        default: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
      release_title: ${{ steps.vars.outputs.release_title }}
      tag_name: ${{ steps.vars.outputs.tag_name }}
    steps:
      - id: vars
        shell: bash
        run: |
          DATE_TIME=$(date +'%d.%m.%Y-%H%M')

          RELEASE_TITLE="${DATE_TIME}"
          TAG_NAME="v${DATE_TIME}"
          VERSION="${DATE_TIME}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "release_title=$RELEASE_TITLE" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

  build-mobile:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
            build_flag: ${{ github.event.inputs.build_android }}
          - platform: ios
            os: macos-latest
            build_flag: ${{ github.event.inputs.build_ios }}
    runs-on: ${{ matrix.os }}
    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1024m"
    steps:
      - name: Checkout Source
        if: matrix.build_flag == 'true'
        uses: actions/checkout@v4
        with:
          repository: dStudios-735453/UniPlan
          token: ${{ secrets.UNIPLAN_SOURCE_GITHUB }}
          path: source

      - name: Setup Node
        if: matrix.build_flag == 'true'
        uses: actions/setup-node@v4
        with:
          cache: "npm"
          cache-dependency-path: source/package.json

      - name: Install NPM dependencies
        if: matrix.build_flag == 'true'
        working-directory: source
        run: npm install --legacy-peer-deps

      - name: Setup Expo
        if: matrix.build_flag == 'true'
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-cache: true

      - name: Setup Gradle Cache
        if: matrix.platform == 'android' && matrix.build_flag == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('source/android/**/*.gradle*', 'source/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Android (Unsigned APK)
        if: matrix.platform == 'android' && matrix.build_flag == 'true'
        working-directory: source
        shell: bash
        run: |
          npx expo prebuild --platform android
          cd android
          ./gradlew assembleRelease

      - name: Build iOS (Unsigned .app / Simulator Build)
        if: matrix.platform == 'ios' && matrix.build_flag == 'true'
        working-directory: source
        run: |
          npx expo prebuild --platform ios
          xcodebuild -workspace ios/UniPlan.xcworkspace \
            -scheme UniPlan \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            SWIFT_VERSION=5.0 \
            OTHER_SWIFT_FLAGS="-DEXPO_SWIFT_MACROS"

      - name: Package iOS App
        if: matrix.platform == 'ios' && matrix.build_flag == 'true'
        working-directory: source
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/UniPlan.app Payload/
          zip -r UniPlan-unsigned.ipa Payload

      - name: Upload Android Artifact
        if: matrix.platform == 'android' && matrix.build_flag == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mobile-build-android
          path: source/android/app/build/outputs/apk/release/*.apk
          retention-days: 2

      - name: Upload iOS Artifact
        if: matrix.platform == 'ios' && matrix.build_flag == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mobile-build-ios
          path: source/UniPlan-unsigned.ipa
          retention-days: 2

  create-release:
    needs: [prepare, build-mobile]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: ${{ needs.prepare.outputs.release_title }}
          draft: false
          prerelease: true
          files: |
            artifacts/**/*.msi
            artifacts/**/*.msi.sig
            artifacts/**/*.exe
            artifacts/**/*.exe.sig
            artifacts/**/*.dmg
            artifacts/**/*.app.tar.gz
            artifacts/**/*.app.tar.gz.sig
            artifacts/**/*.AppImage
            artifacts/**/*.AppImage.sig
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.apk
            artifacts/**/*.ipa
        env:
          GITHUB_TOKEN: ${{ github.token }}
