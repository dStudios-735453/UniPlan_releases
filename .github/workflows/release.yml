name: Build and Release UniPlan

on:
  workflow_dispatch:
    inputs:
      version:
        description: "App version (e.g., 1.0.0)"
        required: true
        default: "0.0.1"
      build_newest_code:
        description: "Build from latest code (alpha release)"
        type: boolean
        default: false
      build_android:
        description: "Build Android APK"
        type: boolean
        default: true
      build_ios:
        description: "Build iOS IPA"
        type: boolean
        default: true
      build_win_x64:
        description: "Build Windows x64"
        type: boolean
        default: true
      build_win_arm64:
        description: "Build Windows ARM64"
        type: boolean
        default: true
      build_mac_x64:
        description: "Build macOS x64"
        type: boolean
        default: true
      build_mac_arm64:
        description: "Build macOS ARM64"
        type: boolean
        default: true
      build_linux_x64:
        description: "Build Linux x64"
        type: boolean
        default: true
      build_linux_arm64:
        description: "Build Linux ARM64"
        type: boolean
        default: true
      update_metadata:
        description: "Update latest.json (Desktop Autoupdater)"
        type: boolean
        default: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
      release_title: ${{ steps.vars.outputs.release_title }}
      tag_name: ${{ steps.vars.outputs.tag_name }}
    steps:
      - id: vars
        run: |
          VERSION="${{ github.event.inputs.version }}"
          IF_ALPHA="${{ github.event.inputs.build_newest_code }}"
          DATE_TIME=$(date +'%Y.%m.%d-%H%M')

          if [ "$IF_ALPHA" = "true" ]; then
            RELEASE_TITLE="${DATE_TIME}-alpha"
            TAG_NAME="v${DATE_TIME}-alpha"
          else
            RELEASE_TITLE="v$VERSION"
            TAG_NAME="v$VERSION"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "release_title=$RELEASE_TITLE" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

  build-desktop:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: win_x64
            os: windows-latest
            arch: x86_64
            target: x86_64-pc-windows-msvc
            build_flag: ${{ github.event.inputs.build_win_x64 }}
          - platform: win_arm64
            os: windows-11-arm
            arch: arm64
            target: aarch64-pc-windows-msvc
            build_flag: ${{ github.event.inputs.build_win_arm64 }}
          - platform: mac_x64
            os: macos-26-intel
            arch: x86_64
            target: x86_64-apple-darwin
            build_flag: ${{ github.event.inputs.build_mac_x64 }}
          - platform: mac_arm64
            os: macos-latest
            arch: aarch64
            target: aarch64-apple-darwin
            build_flag: ${{ github.event.inputs.build_mac_arm64 }}
          - platform: linux_x64
            os: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-gnu
            build_flag: ${{ github.event.inputs.build_linux_x64 }}
          - platform: linux_arm64
            os: ubuntu-latest-arm
            arch: aarch64
            target: aarch64-unknown-linux-gnu
            build_flag: ${{ github.event.inputs.build_linux_arm64 }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Source
        if: matrix.build_flag == 'true'
        uses: actions/checkout@v4
        with:
          repository: dStudios-735453/UniPlan
          token: ${{ secrets.UNIPLAN_SOURCE_GITHUB }}
          path: source

      - name: Setup Node
        if: matrix.build_flag == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: "npm"
          cache-dependency-path: source/package.json

      - name: Install Rust
        if: matrix.build_flag == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: (matrix.os == 'ubuntu-latest' || matrix.os == 'ubuntu-latest-arm') && matrix.build_flag == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install NPM dependencies
        if: matrix.build_flag == 'true'
        working-directory: source
        run: npm install

      - name: Build Tauri App
        if: matrix.build_flag == 'true'
        working-directory: source
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload Artifacts
        if: matrix.build_flag == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-${{ matrix.platform }}
          path: |
            source/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            source/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            source/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            source/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            source/src-tauri/target/${{ matrix.target }}/release/*.sig

  build-mobile:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
            build_flag: ${{ github.event.inputs.build_android }}
          - platform: ios
            os: macos-latest
            build_flag: ${{ github.event.inputs.build_ios }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Source
        if: matrix.build_flag == 'true'
        uses: actions/checkout@v4
        with:
          repository: dStudios-735453/UniPlan
          token: ${{ secrets.UNIPLAN_SOURCE_GITHUB }}
          path: source

      - name: Setup Node
        if: matrix.build_flag == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: source/package.json

      - name: Install NPM dependencies
        if: matrix.build_flag == 'true'
        working-directory: source
        run: npm install

      - name: Setup Expo
        if: matrix.build_flag == 'true'
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-cache: true

      - name: Build Android (Unsigned APK)
        if: matrix.platform == 'android' && matrix.build_flag == 'true'
        working-directory: source
        run: |
          npx expo prebuild --platform android
          cd android
          ./gradlew assembleRelease

      - name: Build iOS (Unsigned .app / Simulator Build)
        if: matrix.platform == 'ios' && matrix.build_flag == 'true'
        working-directory: source
        run: |
          npx expo prebuild --platform ios
          xcodebuild -workspace ios/UniPlan.xcworkspace -scheme UniPlan -configuration Release -sdk iphoneos -derivedDataPath build -quiet

      - name: Package iOS App
        if: matrix.platform == 'ios' && matrix.build_flag == 'true'
        working-directory: source
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/UniPlan.app Payload/
          zip -r UniPlan-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload Android Artifact
        if: matrix.platform == 'android' && matrix.build_flag == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mobile-build-android
          path: source/android/app/build/outputs/apk/release/*.apk

      - name: Upload iOS Artifact
        if: matrix.platform == 'ios' && matrix.build_flag == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mobile-build-ios
          path: source/UniPlan-unsigned.ipa

  create-release:
    needs: [prepare, build-desktop, build-mobile]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: ${{ needs.prepare.outputs.release_title }}
          draft: false
          prerelease: ${{ github.event.inputs.build_newest_code == 'true' }}
          files: |
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.sig
            artifacts/**/*.apk
            artifacts/**/*.ipa
        env:
          GITHUB_TOKEN: ${{ github.token }}

  update-metadata:
    needs: [prepare, create-release]
    runs-on: ubuntu-latest
    if: github.event.inputs.update_metadata == 'true'
    steps:
      - name: Checkout Releases Repo
        uses: actions/checkout@v4

      - name: Download .sig files
        uses: actions/download-artifact@v4
        with:
          path: signatures

      - name: Update latest.json
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          TAG="${{ needs.prepare.outputs.tag_name }}"
          REPO_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          # Helper function to get signature content
          get_sig() {
            find signatures -name "$1" -exec cat {} \; || echo ""
          }

          WIN_X64_SIG=$(get_sig "*.msi.zip.sig") # Tauri updater often uses zip for msi

          # Construct the platforms object dynamically
          PLATFORMS=$(jq -n \
            --arg win_x64_sig "$(find signatures -name "*.msi.zip.sig" -exec cat {} \; | head -n 1)" \
            --arg win_x64_url "${REPO_URL}/UniPlan_${VERSION}_x64_en-US.msi.zip" \
            --arg mac_x64_sig "$(find signatures -name "*.dmg.tar.gz.sig" -exec cat {} \; | head -n 1)" \
            --arg mac_x64_url "${REPO_URL}/UniPlan.app.tar.gz" \
            '{ 
              "windows-x86_64": { "signature": $win_x64_sig, "url": $win_x64_url },
              "darwin-x86_64": { "signature": $mac_x64_sig, "url": $mac_x64_url }
            }')

          # Update latest.json using jq
          jq --arg ver "$VERSION" --arg date "$PUB_DATE" --argjson platforms "$PLATFORMS" \
            '.version = $ver | .pub_date = $date | .platforms = $platforms' \
            latest.json > latest.json.tmp && mv latest.json.tmp latest.json

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git commit -m "chore: update latest.json for ${{ needs.prepare.outputs.tag_name }}"
          git push
